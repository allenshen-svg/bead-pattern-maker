<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>拼豆管理后台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --pri: #6366f1; --bg: #f1f5f9; --sf: #fff; --tx: #1e293b; --tx2: #64748b; --bd: #e2e8f0; --green: #22c55e; --red: #ef4444; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--tx); min-height: 100vh; }

    /* Login overlay */
    .login-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .login-box { background: var(--sf); padding: 32px; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,.08); max-width: 360px; width: 90%; text-align: center; }
    .login-box h2 { margin-bottom: 20px; font-size: 20px; }
    .login-box input { width: 100%; padding: 10px 14px; border: 1px solid var(--bd); border-radius: 8px; font-size: 14px; margin-bottom: 12px; outline: none; -webkit-text-security: disc; text-security: disc; }
    .login-box input:focus { border-color: var(--pri); }
    .login-box .err { color: var(--red); font-size: 13px; margin-bottom: 8px; min-height: 20px; }

    /* Layout */
    .header { background: var(--sf); border-bottom: 1px solid var(--bd); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 18px; }
    .header .logout { background: none; border: none; color: var(--tx2); cursor: pointer; font-size: 13px; }
    .header .logout:hover { color: var(--red); }
    .container { max-width: 1100px; margin: 0 auto; padding: 20px; }

    /* Stats */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 24px; }
    .stat-card { background: var(--sf); border-radius: 10px; padding: 18px; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
    .stat-card .label { font-size: 12px; color: var(--tx2); margin-bottom: 4px; }
    .stat-card .value { font-size: 28px; font-weight: 700; }

    /* Tabs */
    .tabs { display: flex; gap: 0; margin-bottom: 16px; border: 1px solid var(--bd); border-radius: 8px; overflow: hidden; max-width: 500px; }
    .tab-btn { flex: 1; padding: 8px 16px; border: none; background: var(--sf); cursor: pointer; font-size: 13px; font-weight: 600; color: var(--tx2); transition: .2s; }
    .tab-btn.active { background: var(--pri); color: #fff; }

    /* Table */
    .panel { background: var(--sf); border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.04); overflow: hidden; }
    .panel-header { padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--bd); }
    .panel-header h3 { font-size: 15px; }
    .search-input { padding: 6px 12px; border: 1px solid var(--bd); border-radius: 6px; font-size: 13px; width: 220px; outline: none; }
    .search-input:focus { border-color: var(--pri); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: #f8fafc; text-align: left; padding: 10px 14px; font-weight: 600; color: var(--tx2); font-size: 12px; text-transform: uppercase; white-space: nowrap; }
    td { padding: 10px 14px; border-top: 1px solid var(--bd); white-space: nowrap; }
    tr:hover td { background: #fafbfd; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
    .badge-green { background: #dcfce7; color: #166534; }
    .badge-gray { background: #f1f5f9; color: var(--tx2); }
    .badge-red { background: #fef2f2; color: #991b1b; }
    .badge-yellow { background: #fefce8; color: #854d0e; }

    /* Pagination */
    .pagination { padding: 12px 18px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--bd); font-size: 13px; color: var(--tx2); }
    .pagination button { padding: 4px 12px; border: 1px solid var(--bd); border-radius: 6px; background: var(--sf); cursor: pointer; font-size: 12px; }
    .pagination button:disabled { opacity: .4; cursor: not-allowed; }
    .pagination button:not(:disabled):hover { background: var(--pri); color: #fff; border-color: var(--pri); }

    /* Btn */
    .btn { padding: 6px 14px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: .2s; }
    .btn-pri { background: var(--pri); color: #fff; }
    .btn-pri:hover { background: #4f46e5; }
    .btn-sm { padding: 3px 8px; font-size: 11px; }

    /* Modal */
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: flex; align-items: center; justify-content: center; z-index: 50; }
    .modal-bg.hidden { display: none; }
    .modal { background: var(--sf); border-radius: 12px; padding: 24px; max-width: 360px; width: 90%; }
    .modal h3 { margin-bottom: 14px; font-size: 16px; }
    .modal label { display: block; font-size: 12px; color: var(--tx2); margin-bottom: 4px; font-weight: 600; }
    .modal input, .modal select { width: 100%; padding: 8px 12px; border: 1px solid var(--bd); border-radius: 6px; font-size: 13px; margin-bottom: 10px; outline: none; }
    .modal .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }

    .hidden { display: none !important; }

    /* Chart */
    .chart-container { padding: 18px; }
    .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
    .chart-header h3 { font-size: 15px; }
    .chart-tabs { display: flex; gap: 4px; }
    .chart-tab { padding: 4px 12px; border: 1px solid var(--bd); border-radius: 6px; background: var(--sf); cursor: pointer; font-size: 12px; }
    .chart-tab.active { background: var(--pri); color: #fff; border-color: var(--pri); }
    .bar-chart { display: flex; align-items: flex-end; gap: 3px; height: 200px; padding: 0 4px 40px; overflow-x: auto; position: relative; }
    .bar-col { display: flex; flex-direction: column; align-items: center; flex: 1; min-width: 22px; max-width: 40px; position: relative; }
    .bar-col .bar { width: 100%; background: var(--pri); border-radius: 3px 3px 0 0; transition: height .3s; min-height: 1px; cursor: pointer; position: relative; }
    .bar-col .bar:hover { background: #4f46e5; }
    .bar-col .bar-label { position: absolute; top: 100%; left: 50%; transform: translateX(-50%); font-size: 11px; color: var(--tx2); margin-top: 6px; white-space: nowrap; }
    .bar-col .bar-val { font-size: 10px; color: var(--tx); font-weight: 600; margin-bottom: 2px; min-height: 14px; }
    .chart-summary { display: flex; gap: 20px; margin-top: 16px; flex-wrap: wrap; }
    .chart-summary .item { font-size: 13px; color: var(--tx2); }
    .chart-summary .item b { color: var(--tx); }

    /* Feature rank */
    .rank-list { padding: 18px; }
    .rank-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--bd); }
    .rank-item:last-child { border-bottom: none; }
    .rank-num { width: 24px; height: 24px; border-radius: 50%; background: var(--bd); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--tx2); flex-shrink: 0; }
    .rank-item:nth-child(1) .rank-num { background: #fbbf24; color: #fff; }
    .rank-item:nth-child(2) .rank-num { background: #94a3b8; color: #fff; }
    .rank-item:nth-child(3) .rank-num { background: #cd7f32; color: #fff; }
    .rank-name { flex: 1; font-size: 14px; font-weight: 500; }
    .rank-bar-wrap { flex: 2; height: 20px; background: #f1f5f9; border-radius: 10px; overflow: hidden; }
    .rank-bar-fill { height: 100%; background: var(--pri); border-radius: 10px; transition: width .5s; }
    .rank-count { font-size: 13px; font-weight: 600; color: var(--tx); min-width: 50px; text-align: right; }
    .rank-uv { font-size: 11px; color: var(--tx2); min-width: 40px; text-align: right; }

    @media (max-width: 700px) {
      .stats { grid-template-columns: 1fr 1fr; }
      .search-input { width: 140px; }
      td, th { padding: 8px 10px; font-size: 12px; }
      .panel { overflow-x: auto; }
    }
  </style>
</head>
<body>

<!-- Login -->
<div id="loginOverlay" class="login-overlay">
  <div class="login-box">
    <h2>🔐 管理后台</h2>
    <p style="color:var(--tx2);font-size:14px;margin-bottom:16px">需要验证身份</p>
    <div id="keyInputWrap" style="display:none">
      <input type="text" id="adminKeyInput" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" data-form-type="other" data-lpignore="true" style="-webkit-text-security:disc;text-security:disc;width:100%;padding:10px 14px;border:1px solid var(--bd);border-radius:8px;font-size:16px;margin-bottom:8px;outline:none;letter-spacing:2px" placeholder="••••••">
      <div class="err" id="loginErr"></div>
      <button class="btn btn-pri" style="width:100%;padding:10px" id="loginSubmitBtn">确定</button>
    </div>
    <button class="btn btn-pri" id="showKeyBtn" style="width:100%;padding:10px">输入密钥</button>
  </div>
</div>

<!-- Main UI -->
<div id="mainUI" class="hidden">
  <div class="header">
    <h1>🎨 拼豆管理后台</h1>
    <button class="logout" onclick="doLogout()">退出</button>
  </div>

  <div class="container">
    <!-- Stats -->
    <div class="stats">
      <div class="stat-card"><div class="label">总用户数</div><div class="value" id="statTotal">-</div></div>
      <div class="stat-card"><div class="label">今日新注册</div><div class="value" id="statNew">-</div></div>
      <div class="stat-card"><div class="label">今日活跃</div><div class="value" id="statActive">-</div></div>
      <div class="stat-card"><div class="label">豆子总消耗</div><div class="value" id="statBeans">-</div></div>
      <div class="stat-card"><div class="label">总收入(¥)</div><div class="value" id="statRevenue">-</div></div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="users" onclick="switchTab('users')">用户列表</button>
      <button class="tab-btn" data-tab="logs" onclick="switchTab('logs')">豆子日志</button>
      <button class="tab-btn" data-tab="orders" onclick="switchTab('orders')">订单管理</button>
      <button class="tab-btn" data-tab="growth" onclick="switchTab('growth')">用户增长</button>
      <button class="tab-btn" data-tab="features" onclick="switchTab('features')">功能统计</button>
    </div>

    <!-- Users panel -->
    <div id="usersPanel" class="panel">
      <div class="panel-header">
        <h3>用户列表</h3>
        <input class="search-input" id="userSearch" placeholder="搜索邮箱…" oninput="searchUsers()">
      </div>
      <table>
        <thead><tr><th>ID</th><th>邮箱</th><th>豆子</th><th>会员</th><th>注册时间</th><th>最后登录</th><th>操作</th></tr></thead>
        <tbody id="usersBody"></tbody>
      </table>
      <div class="pagination">
        <span id="usersInfo">-</span>
        <div>
          <button id="usersPrev" onclick="usersPage--; loadUsers()" disabled>上一页</button>
          <button id="usersNext" onclick="usersPage++; loadUsers()">下一页</button>
        </div>
      </div>
    </div>

    <!-- Logs panel -->
    <div id="logsPanel" class="panel hidden">
      <div class="panel-header"><h3>豆子消耗日志</h3></div>
      <table>
        <thead><tr><th>ID</th><th>用户</th><th>变动</th><th>原因</th><th>时间</th></tr></thead>
        <tbody id="logsBody"></tbody>
      </table>
      <div class="pagination">
        <span id="logsInfo">-</span>
        <div>
          <button id="logsPrev" onclick="logsPage--; loadLogs()" disabled>上一页</button>
          <button id="logsNext" onclick="logsPage++; loadLogs()">下一页</button>
        </div>
      </div>
    </div>

    <!-- Orders panel -->
    <div id="ordersPanel" class="panel hidden">
      <div class="panel-header">
        <h3>订单列表</h3>
        <select id="orderStatusFilter" style="padding:6px 12px;border:1px solid var(--bd);border-radius:6px;font-size:13px" onchange="ordersPage=1;loadOrders()">
          <option value="">全部状态</option>
          <option value="pending">待确认</option>
          <option value="paid">已支付</option>
          <option value="cancelled">已取消</option>
        </select>
      </div>
      <table>
        <thead><tr><th>订单号</th><th>用户</th><th>套餐</th><th>金额</th><th>豆子</th><th>状态</th><th>创建时间</th><th>操作</th></tr></thead>
        <tbody id="ordersBody"></tbody>
      </table>
      <div class="pagination">
        <span id="ordersInfo">-</span>
        <div>
          <button id="ordersPrev" onclick="ordersPage--;loadOrders()" disabled>上一页</button>
          <button id="ordersNext" onclick="ordersPage++;loadOrders()">下一页</button>
        </div>
      </div>
    </div>

    <!-- Growth panel -->
    <div id="growthPanel" class="panel hidden">
      <div class="chart-container">
        <div class="chart-header">
          <h3>📈 用户增长趋势</h3>
          <div class="chart-tabs">
            <button class="chart-tab active" onclick="switchGrowthView('daily')">日</button>
            <button class="chart-tab" onclick="switchGrowthView('weekly')">周</button>
            <button class="chart-tab" onclick="switchGrowthView('monthly')">月</button>
            <button class="chart-tab" onclick="switchGrowthView('yearly')">年</button>
          </div>
        </div>
        <div id="growthChart" class="bar-chart"></div>
        <div id="growthSummary" class="chart-summary"></div>
      </div>
    </div>

    <!-- Features panel -->
    <div id="featuresPanel" class="panel hidden">
      <div class="chart-container">
        <div class="chart-header">
          <h3>🔥 功能点击排行</h3>
          <div>
            <select id="featureDays" style="padding:6px 12px;border:1px solid var(--bd);border-radius:6px;font-size:13px" onchange="loadFeatureStats()">
              <option value="1">今天</option>
              <option value="7" selected>近7天</option>
              <option value="30">近30天</option>
              <option value="90">近90天</option>
            </select>
          </div>
        </div>
        <div id="featureRank" class="rank-list"></div>
        <div id="beanUsageSection" style="margin-top:20px;padding-top:16px;border-top:1px solid var(--bd)">
          <h4 style="font-size:14px;margin-bottom:10px">🫘 豆子消耗统计（基于实际扣费记录）</h4>
          <div id="beanUsageSummary" style="margin-bottom:12px"></div>
          <div id="beanUsageChart" class="bar-chart"></div>
        </div>
        <div style="margin-top:16px">
          <h4 style="font-size:14px;margin-bottom:10px;color:var(--tx2)">📄 按页面分布（埋点数据）</h4>
          <div id="featureByPage" class="rank-list"></div>
        </div>
      </div>
    </div>

  </div>
</div>
<div id="beansModal" class="modal-bg hidden">
  <div class="modal">
    <h3>调整豆子 — <span id="beansModalEmail"></span></h3>
    <label>调整数量</label>
    <input type="number" id="beansDelta" placeholder="正数增加，负数扣减">
    <label>原因</label>
    <input type="text" id="beansReason" value="管理员调整" placeholder="调整原因">
    <div class="actions">
      <button class="btn" style="background:var(--bd)" onclick="closeBeansModal()">取消</button>
      <button class="btn btn-pri" onclick="submitBeans()">确定</button>
    </div>
  </div>
</div>

<script>
const API = location.origin;
let adminKey = sessionStorage.getItem('pindou_admin_key') || '';
let usersPage = 1, logsPage = 1, ordersPage = 1;
let searchTimer = null;

function headers() { return { 'Content-Type': 'application/json', 'X-Admin-Key': adminKey }; }
function fmtTime(iso) {
  if (!iso) return '-';
  try { const d = new Date(iso); return d.toLocaleString('zh-CN', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' }); }
  catch { return iso.slice(0, 16).replace('T', ' '); }
}

async function promptLogin() {
  const key = document.getElementById('adminKeyInput').value.trim();
  if (!key) return;
  adminKey = key;
  document.getElementById('loginSubmitBtn').disabled = true;
  document.getElementById('loginSubmitBtn').textContent = '验证中…';
  try {
    const r = await fetch(`${API}/api/admin/stats`, { headers: headers() });
    if (r.ok) {
      sessionStorage.setItem('pindou_admin_key', adminKey);
      enterAdmin();
    } else {
      adminKey = '';
      document.getElementById('loginErr').textContent = '密钥错误';
      document.getElementById('adminKeyInput').value = '';
      document.getElementById('adminKeyInput').focus();
    }
  } catch (e) {
    adminKey = '';
    document.getElementById('loginErr').textContent = '网络错误';
  }
  document.getElementById('loginSubmitBtn').disabled = false;
  document.getElementById('loginSubmitBtn').textContent = '确定';
}

// Bind login UI
document.getElementById('showKeyBtn').addEventListener('click', function() {
  this.style.display = 'none';
  document.getElementById('keyInputWrap').style.display = 'block';
  document.getElementById('adminKeyInput').focus();
});
document.getElementById('loginSubmitBtn').addEventListener('click', promptLogin);
document.getElementById('adminKeyInput').addEventListener('keydown', e => { if (e.key === 'Enter') promptLogin(); });

function doLogout() { adminKey = ''; sessionStorage.removeItem('pindou_admin_key'); location.reload(); }

function enterAdmin() {
  document.getElementById('loginOverlay').classList.add('hidden');
  document.getElementById('mainUI').classList.remove('hidden');
  loadStats();
  loadUsers();
}

// Auto-login from session
if (adminKey) {
  fetch(`${API}/api/admin/stats`, { headers: headers() })
    .then(r => {
      if (r.ok) {
        enterAdmin();
      } else {
        adminKey = '';
        sessionStorage.removeItem('pindou_admin_key');
      }
    })
    .catch(() => {});
}

// Stats
async function loadStats() {
  try {
    const r = await fetch(`${API}/api/admin/stats`, { headers: headers() });
    const d = await r.json();
    document.getElementById('statTotal').textContent = d.total_users;
    document.getElementById('statNew').textContent = d.today_new;
    document.getElementById('statActive').textContent = d.today_active;
    document.getElementById('statBeans').textContent = d.total_beans_used;
    document.getElementById('statRevenue').textContent = '¥' + (d.total_revenue || 0);
  } catch {}
}

// Tab switch
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  ['users', 'logs', 'orders', 'growth', 'features'].forEach(t => {
    const p = document.getElementById(t + 'Panel');
    if (p) p.classList.toggle('hidden', t !== tab);
  });
  if (tab === 'logs') loadLogs();
  if (tab === 'orders') loadOrders();
  if (tab === 'growth') loadGrowth();
  if (tab === 'features') loadFeatureStats();
}

// Users
async function loadUsers() {
  const q = document.getElementById('userSearch').value.trim();
  const params = new URLSearchParams({ page: usersPage, per: 50 });
  if (q) params.set('q', q);
  try {
    const r = await fetch(`${API}/api/admin/users?${params}`, { headers: headers() });
    const d = await r.json();
    const tbody = document.getElementById('usersBody');
    tbody.innerHTML = d.users.map(u => `
      <tr>
        <td>${u.id}</td>
        <td>${u.email}</td>
        <td><b>${u.beans}</b></td>
        <td>${u.is_member ? '<span class="badge badge-green">会员</span>' : '<span class="badge badge-gray">普通</span>'}</td>
        <td>${fmtTime(u.created_at)}</td>
        <td>${fmtTime(u.last_login)}</td>
        <td><button class="btn btn-sm btn-pri" onclick="openBeansModal(${u.id},'${u.email.replace(/'/g,"\\'")}')">调豆子</button></td>
      </tr>
    `).join('');
    document.getElementById('usersInfo').textContent = `共 ${d.total} 条，第 ${d.page} 页`;
    document.getElementById('usersPrev').disabled = d.page <= 1;
    document.getElementById('usersNext').disabled = d.users.length < 50;
  } catch {}
}

function searchUsers() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { usersPage = 1; loadUsers(); }, 400);
}

// Bean logs
async function loadLogs() {
  try {
    const r = await fetch(`${API}/api/admin/beans-log?page=${logsPage}&per=50`, { headers: headers() });
    const d = await r.json();
    const tbody = document.getElementById('logsBody');
    tbody.innerHTML = d.logs.map(l => `
      <tr>
        <td>${l.id}</td>
        <td>${l.email || l.user_id}</td>
        <td><span class="badge ${l.delta > 0 ? 'badge-green' : 'badge-red'}">${l.delta > 0 ? '+' : ''}${l.delta}</span></td>
        <td>${l.reason}</td>
        <td>${fmtTime(l.created_at)}</td>
      </tr>
    `).join('');
    document.getElementById('logsInfo').textContent = `共 ${d.total} 条，第 ${d.page} 页`;
    document.getElementById('logsPrev').disabled = d.page <= 1;
    document.getElementById('logsNext').disabled = d.logs.length < 50;
  } catch {}
}

// Beans modal
let beansUid = 0;
function openBeansModal(uid, email) {
  beansUid = uid;
  document.getElementById('beansModalEmail').textContent = email;
  document.getElementById('beansDelta').value = '';
  document.getElementById('beansReason').value = '管理员调整';
  document.getElementById('beansModal').classList.remove('hidden');
}
function closeBeansModal() { document.getElementById('beansModal').classList.add('hidden'); }

async function submitBeans() {
  const delta = parseInt(document.getElementById('beansDelta').value);
  const reason = document.getElementById('beansReason').value.trim() || '管理员调整';
  if (!delta || isNaN(delta)) return alert('请输入有效数量');
  try {
    const r = await fetch(`${API}/api/admin/user/${beansUid}/beans`, {
      method: 'POST', headers: headers(),
      body: JSON.stringify({ delta, reason })
    });
    const d = await r.json();
    if (d.error) alert(d.error);
    else { closeBeansModal(); loadUsers(); loadStats(); }
  } catch { alert('网络错误'); }
}

// Orders
async function loadOrders() {
  const status = document.getElementById('orderStatusFilter').value;
  const params = new URLSearchParams({ page: ordersPage, per: 50 });
  if (status) params.set('status', status);
  try {
    const r = await fetch(`${API}/api/admin/orders?${params}`, { headers: headers() });
    const d = await r.json();
    const tbody = document.getElementById('ordersBody');
    tbody.innerHTML = d.orders.map(o => {
      const statusBadge = o.status === 'paid'
        ? '<span class="badge badge-green">已支付</span>'
        : o.status === 'cancelled'
          ? '<span class="badge badge-red">已取消</span>'
          : '<span class="badge badge-yellow">待确认</span>';
      const actions = o.status === 'pending'
        ? `<button class="btn btn-sm btn-pri" onclick="confirmOrder(${o.id},'${o.order_no}')">✅ 确认</button> <button class="btn btn-sm" style="background:var(--bd)" onclick="cancelOrder(${o.id})">取消</button>`
        : '-';
      return `<tr>
        <td style="font-family:monospace;font-size:11px">${o.order_no}</td>
        <td>${o.email || o.user_id}</td>
        <td>${o.package_name}</td>
        <td><b>¥${o.amount}</b></td>
        <td>${o.beans}</td>
        <td>${statusBadge}</td>
        <td>${fmtTime(o.created_at)}</td>
        <td>${actions}</td>
      </tr>`;
    }).join('');
    document.getElementById('ordersInfo').textContent = `共 ${d.total} 条，第 ${d.page} 页`;
    document.getElementById('ordersPrev').disabled = d.page <= 1;
    document.getElementById('ordersNext').disabled = d.orders.length < 50;
  } catch {}
}

async function confirmOrder(orderId, orderNo) {
  if (!confirm(`确认订单 ${orderNo} 已收款？豆子将自动发放。`)) return;
  try {
    const r = await fetch(`${API}/api/admin/order/${orderId}/confirm`, { method: 'POST', headers: headers() });
    const d = await r.json();
    if (d.error) alert(d.error);
    else { alert('✅ 已确认到账'); loadOrders(); loadStats(); }
  } catch { alert('网络错误'); }
}

async function cancelOrder(orderId) {
  if (!confirm('确定取消此订单？')) return;
  try {
    const r = await fetch(`${API}/api/admin/order/${orderId}/cancel`, { method: 'POST', headers: headers() });
    const d = await r.json();
    if (d.error) alert(d.error);
    else loadOrders();
  } catch { alert('网络错误'); }
}

// ── User Growth ──
let growthData = null;
let growthView = 'daily';

async function loadGrowth() {
  if (growthData) { renderGrowth(); return; }
  try {
    const r = await fetch(`${API}/api/admin/user-growth?days=90`, { headers: headers() });
    growthData = await r.json();
    renderGrowth();
  } catch {}
}

function switchGrowthView(view) {
  growthView = view;
  document.querySelectorAll('.chart-tab').forEach(b => b.classList.toggle('active', b.textContent === {daily:'日',weekly:'周',monthly:'月',yearly:'年'}[view]));
  renderGrowth();
}

function renderGrowth() {
  if (!growthData) return;
  const container = document.getElementById('growthChart');
  const summary = document.getElementById('growthSummary');
  let items = [];

  if (growthView === 'daily') {
    items = growthData.daily.slice(-30).map(d => ({ label: d.day.slice(5), value: d.count, full: d.day }));
  } else if (growthView === 'weekly') {
    items = growthData.weekly.map(d => ({ label: d.week.slice(5), value: d.cnt, full: d.week }));
  } else if (growthView === 'monthly') {
    items = growthData.monthly.map(d => ({ label: d.month.slice(2), value: d.cnt, full: d.month }));
  } else {
    items = growthData.yearly.map(d => ({ label: d.year, value: d.cnt, full: d.year }));
  }

  const max = Math.max(1, ...items.map(i => i.value));
  // Show label every Nth bar to avoid overlap
  const step = items.length > 20 ? 5 : items.length > 12 ? 3 : 1;
  container.innerHTML = items.map((i, idx) => {
    const h = Math.max(2, (i.value / max) * 160);
    const showLabel = idx % step === 0 || idx === items.length - 1;
    return `<div class="bar-col"><div class="bar-val">${i.value || ''}</div><div class="bar" style="height:${h}px" title="${i.full}: ${i.value} 人"></div>${showLabel ? `<div class="bar-label">${i.label}</div>` : ''}</div>`;
  }).join('');

  // Summary
  const total = items.reduce((s, i) => s + i.value, 0);
  const avg = items.length ? (total / items.length).toFixed(1) : 0;
  const peak = items.reduce((m, i) => i.value > m.value ? i : m, { value: 0, full: '-' });
  summary.innerHTML = `
    <div class="item">期间总新增: <b>${total}</b></div>
    <div class="item">日均: <b>${avg}</b></div>
    <div class="item">峰值: <b>${peak.value}</b> (${peak.full})</div>
  `;
}

// ── Feature Stats ──
async function loadFeatureStats() {
  const days = document.getElementById('featureDays').value;
  try {
    const r = await fetch(`${API}/api/admin/feature-stats?days=${days}`, { headers: headers() });
    const d = await r.json();
    renderFeatureRank(d.top_features);
    renderBeanUsage(d.bean_usage);
    renderFeatureByPage(d.by_page);
  } catch {}
}

function renderFeatureRank(features) {
  const container = document.getElementById('featureRank');
  if (!features || !features.length) { container.innerHTML = '<p style="color:var(--tx2);font-size:13px;padding:12px 0">暂无数据，等待前端埋点上报</p>'; return; }
  const max = features[0].cnt;
  container.innerHTML = features.map((f, i) => {
    const pct = Math.max(3, (f.cnt / max) * 100);
    return `<div class="rank-item">
      <div class="rank-num">${i + 1}</div>
      <div class="rank-name">${f.feature}</div>
      <div class="rank-bar-wrap"><div class="rank-bar-fill" style="width:${pct}%"></div></div>
      <div class="rank-count">${f.cnt} 次</div>
      <div class="rank-uv">${f.uv} UV</div>
    </div>`;
  }).join('');
}

function renderBeanUsage(bean) {
  const summaryEl = document.getElementById('beanUsageSummary');
  const chartEl = document.getElementById('beanUsageChart');
  if (!bean || !bean.daily || !bean.daily.length) {
    summaryEl.innerHTML = '<span style="color:var(--tx2);font-size:13px">暂无数据</span>';
    chartEl.innerHTML = '';
    return;
  }
  const avg = bean.daily.length ? (bean.total / bean.daily.length).toFixed(1) : 0;
  const peak = bean.daily.reduce((m, d) => d.cnt > m.cnt ? d : m, { cnt: 0, day: '-' });
  summaryEl.innerHTML = `<span class="item">总消耗: <b>${bean.total} 次</b></span>&nbsp;&nbsp;
    <span class="item">独立用户: <b>${bean.uv}</b></span>&nbsp;&nbsp;
    <span class="item">日均: <b>${avg}</b></span>&nbsp;&nbsp;
    <span class="item">峰值: <b>${peak.cnt}</b> (${peak.day})</span>`;

  const max = Math.max(1, ...bean.daily.map(d => d.cnt));
  const step = bean.daily.length > 20 ? 5 : bean.daily.length > 12 ? 3 : 1;
  chartEl.innerHTML = bean.daily.map((d, idx) => {
    const h = Math.max(2, (d.cnt / max) * 140);
    const showLabel = idx % step === 0 || idx === bean.daily.length - 1;
    return `<div class="bar-col"><div class="bar-val">${d.cnt}</div><div class="bar" style="height:${h}px;background:#f59e0b" title="${d.day}: ${d.cnt} 次 / ${d.uv} UV"></div>${showLabel ? `<div class="bar-label">${d.day.slice(5)}</div>` : ''}</div>`;
  }).join('');
}

function renderFeatureByPage(byPage) {
  const container = document.getElementById('featureByPage');
  if (!byPage || !byPage.length) { container.innerHTML = ''; return; }
  // Group by page
  const pages = {};
  byPage.forEach(r => {
    const p = r.page || '/';
    if (!pages[p]) pages[p] = [];
    pages[p].push(r);
  });
  const pageNames = { '/': '首页', '/templates.html': '模板库', '/color-cards.html': '色卡对比', '/tutorial.html': '教程', '/text-generator.html': '文字生成' };
  container.innerHTML = Object.entries(pages).map(([page, items]) => {
    const name = pageNames[page] || page;
    const total = items.reduce((s, i) => s + i.cnt, 0);
    return `<div style="margin-bottom:12px"><div style="font-weight:600;font-size:13px;margin-bottom:4px">${name} <span style="color:var(--tx2);font-weight:400">(${total} 次)</span></div>
    ${items.slice(0, 5).map(i => `<span class="badge badge-gray" style="margin:2px">${i.feature} ×${i.cnt}</span>`).join('')}
    </div>`;
  }).join('');
}
</script>
